<!DOCTYPE html>
<html>
<head>
    <title>I Survived 9 Robin Drive</title>
    
    <!-- NEW: Forces phones and tablets to scale correctly and show touch controls -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <style>
        body { 
            background-color: #2b2b2b; 
            color: #ffffff; 
            text-align: center; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 10px; /* Gives a little breathing room */
        }
        #game-container { 
            width: 100%; 
            max-width: 768px; /* Never get bigger than this */
            aspect-ratio: 4 / 3; /* Always keep the classic C64 shape! */
            height: auto; 
            margin: 0 auto; 
            box-shadow: 0px 0px 20px #000;
        }
    </style>
</head>
<body>
    <h1>I Survived 9 Robin Drive</h1>
    <p>Controls: Arrow Keys to move. 'X' to jump.Press 'X' while holding Down to drop through platforms.</p>
    
    <div id="game-container">
        <div id="game"></div>
    </div>

<script>
        EJS_player = '#game';
        EJS_core = 'c64'; 
        EJS_gameUrl = 'main.prg'; 
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; 

        // --- NEW: Custom Mobile Gamepad ---
        EJS_VirtualGamepadSettings =[
            // 1. The D-Pad on the left
            { type: "dpad", location: "left", left: "50%", right: "50%", joystickInput: false, inputValues:[4, 5, 6, 7] },
            
            // 2. The single Action Button (Fire) on the right
            { type: "button", text: "ACTION", id: "fire", location: "right", left: 40, top: 60, fontSize: 16, bold: true, input_value: 0 }
        ];
    </script>
    
    <!-- THIS IS THE MAGIC LINE THAT WAS MISSING! -->
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
