<!DOCTYPE html>
<html>
<head>
    <title>I Survived 9 Robin Drive</title>
    
    <!-- NEW: Forces phones and tablets to scale correctly and show touch controls -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Tells mobile browsers to hide the address bar if saved to Home Screen -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
<style>
        body { 
            background-color: #2b2b2b; 
            color: #ffffff; 
            text-align: center; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 10px; 
            /* Flexbox keeps everything perfectly centered */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 { margin: 5px 0; font-size: 1.5em; }
        p { margin: 5px 0 15px 0; font-size: 0.9em; }
        
        #game-container { 
            width: 100%; 
            max-width: 768px; 
            aspect-ratio: 4 / 3; 
            box-shadow: 0px 0px 20px #000;
        }

  /* --- THE MAGIC LANDSCAPE FIX --- */
        @media (orientation: landscape) and (max-height: 600px) {
            h1, p { 
                display: none; 
            } 
            body {
                padding: 0;
                margin: 0;
                overflow: hidden; /* Absolutely forbid the browser from scrolling */
            }
            #game-container {
                position: fixed; /* Lock the game to the top-left corner */
                top: 0;
                left: 0;
                width: 100vw; 
                height: 100dvh; /* 'dvh' accounts for the mobile URL bar! */
                max-width: none; 
                aspect-ratio: auto; 
                box-shadow: none; /* Turn off the shadow for full-screen mode */
            }
        }
    </style>
</head>
<body>
    <h1>I Survived 9 Robin Drive</h1>
    <p>Controls: Arrow Keys to move. 'X' to jump.Press 'X' while holding Down to drop through platforms.</p>
    
    <div id="game-container">
        <div id="game"></div>
    </div>

<script>
        EJS_player = '#game';
        EJS_core = 'c64'; 
        EJS_gameUrl = 'main.prg'; 
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; 

        // --- NEW: Custom Mobile Gamepad ---
        EJS_VirtualGamepadSettings =[
            // 1. The D-Pad on the left
            { type: "dpad", location: "left", left: "50%", right: "50%", joystickInput: false, inputValues:[4, 5, 6, 7] },
            
            // 2. The single Action Button (Fire) on the right
            { type: "button", text: "ACTION", id: "fire", location: "right", left: 40, top: 60, fontSize: 16, bold: true, input_value: 0 }
        ];

        // --- NEW: Auto-Fullscreen on first tap ---
        document.body.addEventListener('click', function() {
            if (!document.fullscreenElement && /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                document.documentElement.requestFullscreen().catch((e) => {
                    console.log("Fullscreen blocked by browser");
                });
            }
        }, { once: true }); // The 'once: true' means it only fires on the very first tap
    </script>
    
    <!-- THIS IS THE MAGIC LINE THAT WAS MISSING! -->
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
